<!-- Header -->
<header>
  <div class="container">
    <div class="row">
      <div class="col-lg-12">
        <img class="img-responsive" src="/img/profile.png" alt="profile-pic" />
        <div class="intro-text">
          <span class="name" id="portfolioTitle" style="cursor: pointer;">{{ site.title }}</span>
          <hr class="star-light" />
          <span class="skills">{{ site.skills }}</span>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- Portfolio Modal -->
<div id="portfolioModal" class="modal fade" role="dialog">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" data-dismiss="modal">&times;</button>
        <h4 class="modal-title">Mi Portfolio</h4>
      </div>
      <div class="modal-body">
        <p>Bienvenid@ a mi portfolio digital puedes visitar mis proyectos y despliegues.</p>
        <p style="margin-top: 20px;">
          <strong>GitHub:</strong> <a href="https://github.com/Raulito007/Raulito007.github.io" target="_blank">https://github.com/Raulito007/Raulito007.github.io</a>
        </p>
        <p>
          <strong>LinkedIn:</strong> <a href="https://www.linkedin.com/in/ra%C3%BAl-garc%C3%ADa-g%C3%B3mez-312961185/" target="_blank">https://www.linkedin.com/in/raúl-garcía-gómez-312961185/</a>
        </p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-default" data-dismiss="modal">Cerrar</button>
      </div>
    </div>
  </div>
</div>

<script>
  document.getElementById('portfolioTitle').addEventListener('click', function() {
    $('#portfolioModal').modal('show');
  });
</script>
